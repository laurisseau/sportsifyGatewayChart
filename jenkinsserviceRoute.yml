apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jenkins-route
  namespace: jenkins            # HTTPRoute lives in Jenkins namespace
spec:
  parentRefs:
  - name: sportsify-gateway
    namespace: sportsify-ns
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /jenkins
    backendRefs:
    - name: jenkins
      namespace: jenkins         # points to Jenkins service namespace
      port: 8080
      kind: Service


# https://oneuptime.com/blog/post/2026-02-24-how-to-set-up-cross-namespace-routing-with-gateway-api/view