apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: sportsify-gateway       # Your Envoy Gateway name
      namespace: sportsify-ns
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      filters:
        # Tell Grafana it's behind /grafana
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              x-forwarded-prefix: /grafana
        # Strip /grafana before sending request to the service
        - type: RequestRedirect
          requestRedirect:
            strip_path_prefix: /grafana
      backendRefs:
        - name: kube-prometheus-stack-grafana  # Grafana service name
          namespace: monitoring
          port: 80
          kind: Service